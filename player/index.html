<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signage Player</title>
  <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #000;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: white;
      }

      #media-container {
        width: 100%;
        height: 100%;
        position: relative;
      }

      .media-slide {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 1s ease-in-out;
      }

      .media-slide.active {
        opacity: 1;
      }

      .media-slide img,
      .media-slide video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Info-Leiste unten */
      #info-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 60px;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 30px;
        z-index: 100;
      }

      #clock {
        font-size: 28px;
        font-weight: bold;
        letter-spacing: 2px;
      }

      #date {
        font-size: 16px;
        color: #ccc;
      }

      #weather {
        font-size: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* Fortschrittsbalken */
      #progress-bar {
        position: fixed;
        bottom: 60px;
        left: 0;
        height: 3px;
        background: #4f9cf9;
        width: 0%;
        transition: width linear;
        z-index: 100;
      }
      #screen-info {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.6);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 14px;
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #screen-name {
        font-weight: bold;
        color: white;
      }

      #screen-location {
        color: #aaa;
        font-size: 12px;
      }
      /* Slide Counter */
      #slide-counter {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(0,0,0,0.5);
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 13px;
        z-index: 100;
      }

      #no-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 20px;
        color: #555;
      }

      #no-content h1 { font-size: 48px; }
      #no-content p  { font-size: 20px; }
      #fullscreen-btn {
      position: fixed;
      top: 20px;
      right: 70px;
      background: rgba(0, 0, 0, 0.6);
      border: none;
      color: white;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 16px;
      z-index: 100;
      transition: background 0.2s;
    }

    #fullscreen-btn:hover {
      background: rgba(0, 0, 0, 0.85);
    }
</style>
</head>

<body>
<div id="media-container">
  <div id="no-content">
    <h1>📺</h1>
    <p>Warte auf Inhalte...</p>
  </div>
</div>
<div id="screen-info" style="display:none">
  <span>📺</span>
  <span id="screen-name"></span>
  <span id="screen-location"></span>
  <button id="fullscreen-btn" onclick="toggleFullscreen()" title="Vollbild">⛶</button>
</div>

<div id="progress-bar"></div>
<div id="slide-counter"></div>

<div id="info-bar">
  <div>
    <div id="clock">00:00:00</div>
    <div id="date"></div>
  </div>
  <div id="weather">
  <span id="weather-city" style="font-size:16px; color:#aaa;"></span>
  <span id="weather-temp">--°C</span>
  <span id="weather-desc">--</span>
</div>

<script>
  const API_URL  = "http://localhost:8000";
  const params   = new URLSearchParams(window.location.search);
  const TOKEN    = params.get("token");
  const SCREEN_ID = params.get("screen");   // Screen-Modus: Zeitplan-basiert
  const headers  = TOKEN ? { Authorization: `Bearer ${TOKEN}` } : {};
  let   activePlaylistId = null;
  let   CURRENT_CITY = "";
  let   CITY_TIMEZONE_OFFSET = null; // seconds from UTC, null = use local time

  // ── Uhr ──────────────────────────────────────────────
  function updateClock() {
    let now;
    if (CITY_TIMEZONE_OFFSET !== null) {
      const utcMs = Date.now() + new Date().getTimezoneOffset() * 60000;
      now = new Date(utcMs + CITY_TIMEZONE_OFFSET * 1000);
    } else {
      now = new Date();
    }
    document.getElementById("clock").textContent = now.toLocaleTimeString("de-DE");
    document.getElementById("date").textContent  = now.toLocaleDateString("de-DE", {
      weekday: "long", year: "numeric", month: "long", day: "numeric"
    });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Wetter ───────────────────────────────────────────
  async function loadWeather() {
  try {
    const res  = await fetch(`${API_URL}/weather/${CURRENT_CITY}`, { headers });
    const data = await res.json();
    document.getElementById("weather-city").textContent = `${data.city} |`;
    document.getElementById("weather-temp").textContent = `${data.temperature}°C`;
    document.getElementById("weather-desc").textContent = data.description;
    if (typeof data.timezone === "number") {
      CITY_TIMEZONE_OFFSET = data.timezone;
      updateClock();
    }
  } catch {}
  }
  loadWeather();
  setInterval(loadWeather, 5 * 60 * 1000);

  // ── Playlist Player mit Smooth Übergängen ────────────
  let playlist  = [];
  let current   = 0;
  let timer     = null;
  let progress  = null;

  function showItem(index) {
    if (playlist.length === 0) return;

    const item      = playlist[index];
    const container = document.getElementById("media-container");
    const duration  = (item.duration || 10) * 1000;
    const url       = `${API_URL}/drive/media/${item.file_id}?token=${TOKEN}`;

    // Slide Counter
    document.getElementById("slide-counter").textContent =
      `${index + 1} / ${playlist.length}`;

    // Neues Slide erstellen
    const slide = document.createElement("div");
    slide.className = "media-slide";

    if (item.type === "video") {
      slide.innerHTML = `<video src="${url}" autoplay muted playsinline></video>`;
    } else {
      slide.innerHTML = `<img src="${url}" alt="Signage"/>`;
    }

    container.appendChild(slide);

    // Altes Slide ausblenden
    const oldSlide = container.querySelector(".media-slide.active");

    // Einblenden nach kurzem Delay
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        slide.classList.add("active");
        if (oldSlide) {
          oldSlide.style.opacity = "0";
          setTimeout(() => oldSlide.remove(), 1000);
        }
      });
    });

    // No-content ausblenden
    const noContent = document.getElementById("no-content");
    if (noContent) noContent.style.display = "none";

    // Fortschrittsbalken
    clearInterval(progress);
    const bar = document.getElementById("progress-bar");
    bar.style.transition = "none";
    bar.style.width = "0%";

    setTimeout(() => {
      bar.style.transition = `width ${duration}ms linear`;
      bar.style.width = "100%";
    }, 50);

    // Timer für nächstes Slide
    clearTimeout(timer);
    if (item.type === "video") {
      const video = slide.querySelector("video");
      video.onended = () => nextItem();
      video.onerror = () => nextItem();
    } else {
      timer = setTimeout(() => nextItem(), duration);
    }
  }

  function nextItem() {
    current = (current + 1) % playlist.length;
    showItem(current);
  }

  // ── Playlist laden ────────────────────────────────────
  async function loadPlaylist() {
    if (!TOKEN) return;

    try {
      let pl = null;

      if (SCREEN_ID) {
        // Screen-Modus: aktive Playlist laut Zeitplan laden
        const res = await fetch(`${API_URL}/screens/${SCREEN_ID}/active-playlist`, { headers });
        if (!res.ok) return;
        pl = await res.json();

        if (!pl) {
          // Kein aktiver Zeitplan → Screen leeren
          playlist = [];
          clearTimeout(timer);
          document.getElementById("media-container").innerHTML =
            '<div id="no-content"><h1>📺</h1><p>Kein aktiver Zeitplan</p></div>';
          activePlaylistId = null;
          return;
        }

        // Zeitplan-Wechsel → WebSocket neu verbinden
        if (pl.id !== activePlaylistId) {
          activePlaylistId = pl.id;
          connectWebSocket();
        }
      } else {
        // Direktmodus: feste Playlist-ID aus URL
        const playlistId = params.get("playlist");
        if (!playlistId) return;
        const res  = await fetch(`${API_URL}/playlists/`, { headers });
        const data = await res.json();
        pl = data.find(p => p.id == playlistId);
        if (!pl) return;
        if (!activePlaylistId) { activePlaylistId = pl.id; }
      }

      if (pl.screen_name) {
        document.getElementById("screen-info").style.display = "flex";
        document.getElementById("screen-name").textContent = pl.screen_name;
        document.getElementById("screen-location").textContent =
          pl.screen_location ? `· ${pl.screen_location}` : '';
      }

      if (pl.city) {
        CURRENT_CITY = pl.city;
        loadWeather();
      } else {
        document.getElementById("weather-temp").textContent = '';
        document.getElementById("weather-desc").textContent = 'Kein Standort';
        document.getElementById("weather-city").textContent = '';
      }

      if (pl.items && pl.items.length > 0) {
        const wasEmpty = playlist.length === 0;
        playlist = pl.items;
        if (wasEmpty) showItem(0);
      }
    } catch {}
  }

  loadPlaylist();
  setInterval(loadPlaylist, 60 * 1000);

  // ── WebSocket Live-Updates ────────────────────────────
    function connectWebSocket() {
      const playlistId = activePlaylistId || params.get("playlist");
      if (!playlistId) return;

      const wsUrl = `ws://localhost:8000/ws/player/${playlistId}?token=${TOKEN}${SCREEN_ID ? '&screen_id=' + SCREEN_ID : ''}`;
      const ws    = new WebSocket(wsUrl);

      ws.onopen = () => {
        console.log("WebSocket verbunden ✅");
      }

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.event === "playlist_updated") {
          console.log("Playlist aktualisiert!", data.items);
          playlist = data.items;
          current  = 0;
          showItem(0);
        }
      }

      ws.onclose = () => {
        console.log("WebSocket getrennt — reconnect in 3s");
        setTimeout(connectWebSocket, 3000);
      }

      ws.onerror = () => ws.close();
    }

    connectWebSocket();
    // ── Vollbild ─────────────────────────────────────────
    function toggleFullscreen() {
      const btn = document.getElementById("fullscreen-btn")

      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen()
        btn.textContent = "✕"
        btn.title = "Vollbild beenden"
      } else {
        document.exitFullscreen()
        btn.textContent = "⛶"
        btn.title = "Vollbild"
      }
    }

    // Automatisch Vollbild beim Start
    document.addEventListener("click", function initFullscreen() {
      document.documentElement.requestFullscreen()
      document.removeEventListener("click", initFullscreen)
    })

    // Button Text aktualisieren wenn Fullscreen geändert wird
    document.addEventListener("fullscreenchange", () => {
      const btn = document.getElementById("fullscreen-btn")
      if (document.fullscreenElement) {
        btn.textContent = "✕"
        btn.title = "Vollbild beenden"
      } else {
        btn.textContent = "⛶"
        btn.title = "Vollbild"
      }
    })
</script>

</body>
</html>
